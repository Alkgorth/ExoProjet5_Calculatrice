<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat - Calculatrice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/resultat.css" rel="stylesheet">
</head>
<body>
    <div class="result-card">
        <div class="text-center">
            <h1>✅ Calcul terminé</h1>
            <p class="operation-title" th:text="${operation}">Opération</p>
        </div>

        <!-- Affichage du résultat numérique (pour somme et sommeMultiple) -->
        <div th:if="${resultat != null}" class="result-value" th:text="${resultat}">
            42
        </div>

        <!-- Affichage du nombre premier -->
        <div th:if="${estPremier != null}" class="result-value">
            <div th:if="${estPremier}" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                ✨ Ce nombre EST premier !
            </div>
            <div th:unless="${estPremier}" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                ❌ Ce nombre N'est PAS premier
            </div>
        </div>

        <!-- Affichage de la factorisation (liste de facteurs) -->
        <div th:if="${facteurs != null}" class="facteurs-list">
            <h5 class="mb-3">Facteurs premiers :</h5>
            <div>
                <span th:each="facteur, iterStat : ${facteurs}">
                    <span class="facteur-item" th:text="${facteur}">2</span>
                    <span th:if="${!iterStat.last}" style="font-size: 1.5rem; color: #667eea;"> × </span>
                </span>
            </div>
        </div>

        <div class="text-center">
            <a href="/" class="btn-home">
                🏠 Retour à l'accueil
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
