<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat - Calculatrice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/resultat.css" rel="stylesheet">
</head>
<body>
    <div class="result-card">
        <div class="text-center">
            <h1>✅ Calcul terminé</h1>
            <p class="operation-title" th:text="${resultat.operation}">Opération</p>
        </div>

        <!-- Affichage du résultat numérique (pour somme et sommeMultiple) -->
        <div th:if="${resultat.resultat != null}" class="result-value" th:text="${resultat.resultat}">
            42
        </div>

        <!-- Affichage du nombre premier -->
        <div th:if="${resultat.estPremier != null}" class="result-value">
            <div th:if="${resultat.estPremier}" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                ✨ Ce nombre EST premier !
            </div>
            <div th:unless="${resultat.estPremier}" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);">
                ❌ Ce nombre N'est PAS premier
            </div>
        </div>

        <!-- Affichage de la factorisation (liste de facteurs) -->
        <div th:if="${resultat.facteurs != null}" class="facteurs-list">
            <h5 class="mb-3">Facteurs premiers :</h5>
            <div>
                <span th:each="facteur, iterStat : ${resultat.facteurs}">
                    <span class="facteur-item" th:text="${facteur}">2</span>
                    <span th:if="${!iterStat.last}" style="font-size: 1.5rem; color: #667eea;"> × </span>
                </span>
            </div>
        </div>

        <!-- Affichage du calcul de puissance -->
        <div th:if="${resultat.base != null and resultat.exposant != null}" class="result-value">
            <span th:text="${resultat.base}">2</span>^<span th:text="${resultat.exposant}">10</span> = <span th:text="${resultat.resultat}">1024</span>
        </div>

        <!-- Affichage de la table de multiplication -->
        <div th:if="${resultat.table != null}" class="facteurs-list">
            <h5 class="mb-3">Table de multiplication de <span th:text="${resultat.nombre}">7</span> :</h5>
            <div style="background: white; padding: 15px; border-radius: 8px; font-family: monospace; line-height: 1.8;">
                <div th:each="ligne : ${resultat.table}" th:text="${ligne}">
                    3 x  1 =    3
                </div>
            </div>
        </div>

        <div class="text-center">
            <a href="/" class="btn-home">
                🏠 Retour à l'accueil
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
